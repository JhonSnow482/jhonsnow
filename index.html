<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aethelgard Arşivleri | Majestelerinin Hazinesi</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>
<body>

<div id="particles-js"></div>

<div class="container">
    <header>
        <h1>Aethelgard Arşivleri</h1>
        <p style="text-align: center; font-style: italic; color: #74b9ff;">Majestelerinin Arşivine Hoşgeldin, GEZGİN</p>
        <div style="height: 2px; background: linear-gradient(to right, transparent, #74b9ff, transparent); margin: 20px 0;"></div>
    </header>

    <main>
        <div class="kitap-item">
            <div class="kitap-baslik" onclick="toggleBolum('bolum1')">⚔️ EJDERHALAR KITASI: YOZLAŞMANIN ÇAĞI</div>
           <div id="bolum1" class="bolumler">
    <p>Mistik parşömen açılıyor, mürekkep canlanıyor...</p>
    
    <!-- "bolumler/" ön ekini eklemeyi unutmayın! -->
    <a href="Bolumler/00_bolum.html" class="bolum-link">00 | İLK KARŞILAŞMA</a>
    <a href="Bolumler/01_bolum.html" class="bolum-link">01 | TRİSTAN GECESİ</a>
    <a href="Bolumler/02_bolum.html" class="bolum-link">02 | TRİSTAN GECESİ II</a>
</div>
        </div>

        <div class="kitap-item">
            <div class="kitap-baslik" onclick="toggleBolum('bolum2')">🔮 KARANLIK KEHANET</div>
            <div id="bolum2" class="bolumler">
                <p>Bu sayfalar henüz mühürlü, GEZGİN...</p>
            </div>
        </div>
    </main>
</div>

<script>
    function toggleBolum(id) {
        var bolum = document.getElementById(id);
        bolum.style.display = (bolum.style.display === "block") ? "none" : "block";
    }

    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 80 },
            "color": { "value": "#74b9ff" },
            "shape": { "type": "circle" },
            "opacity": { "value": 0.5, "random": true },
            "size": { "value": 3, "random": true },
            "move": { "enable": true, "speed": 1, "direction": "top", "random": true }
        }
    });
</script>

</body>
</html>
